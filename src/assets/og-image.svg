  <text x="122" y="389" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="24" font-weight="700" fill="#0f2f3f">投資助言ではなく、実体験で学ぶための記録</text>
  <text x="122" y="433" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" fill="#57717b">BTC / XRP / ETH / SOL / ADA / SUI を年間10万円以内で観察します。</text>
