  <text x="258" y="165" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="32" font-weight="700" fill="#0f2f3f">10万円で学ぶ暗号資産ログ</text>
  <text x="258" y="220" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="22" fill="#57717b">少額運用でWeb3・税務・相場サイクルを学ぶ個人記録</text>
  <rect x="122" y="314" width="956" height="18" rx="9" fill="#e8efed"/>
