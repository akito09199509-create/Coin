name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Resolve site URL
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          CUSTOM_SITE_URL="${{ vars.SITE_URL }}"
          CUSTOM_BASE_PATH="${{ vars.SITE_BASE_PATH }}"

          if [[ -n "$CUSTOM_BASE_PATH" ]]; then
            BASE_PATH="$CUSTOM_BASE_PATH"
          elif [[ "$REPO_NAME" == "${GITHUB_REPOSITORY_OWNER}.github.io" ]]; then
            BASE_PATH=""
          elif [[ -n "$CUSTOM_SITE_URL" ]]; then
            BASE_PATH=""
          else
            BASE_PATH="/$REPO_NAME"
          fi

          if [[ -n "$CUSTOM_SITE_URL" ]]; then
            SITE_URL="${CUSTOM_SITE_URL%/}"
          else
            SITE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io${BASE_PATH}"
          fi

          echo "SITE_BASE_PATH=$BASE_PATH" >> "$GITHUB_ENV"
          echo "SITE_URL=$SITE_URL" >> "$GITHUB_ENV"
          echo "Building for $SITE_URL with base path '${BASE_PATH:-/}'"

      - name: Build
        run: node scripts/build.mjs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
