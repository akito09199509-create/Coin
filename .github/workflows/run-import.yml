name: Run source import

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: run-source-import
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore source archive
        shell: bash
        run: |
          node -e "const fs=require('fs');const text=fs.readFileSync('.github/workflows/import-blog-source.yml','utf8');const marker=\"<<'ARCHIVE'\\n\";const start=text.indexOf(marker);if(start<0) throw new Error('archive marker not found');const bodyStart=start+marker.length;const end=text.indexOf('\\nARCHIVE',bodyStart);if(end<0) throw new Error('archive terminator not found');fs.writeFileSync('/tmp/coin-source.tar.br.b64',text.slice(bodyStart,end)+'\\n');"
          base64 -d /tmp/coin-source.tar.br.b64 > /tmp/coin-source.tar.br
          node -e "const fs=require('fs'),zlib=require('zlib');fs.writeFileSync('/tmp/coin-source.tar',zlib.brotliDecompressSync(fs.readFileSync('/tmp/coin-source.tar.br')));"

      - name: Replace repository contents
        shell: bash
        run: |
          mkdir -p /tmp/coin-source
          tar -xf /tmp/coin-source.tar -C /tmp/coin-source
          find . -mindepth 1 -maxdepth 1 ! -name .git ! -name .github -exec rm -rf {} +
          find /tmp/coin-source -mindepth 1 -maxdepth 1 ! -name .git ! -name .github -exec cp -R {} . \;
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A -- . ':!.github/workflows'
          git commit -m 'Import blog MVP source' || exit 0
          git push

      - name: Build site for Pages
        shell: bash
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          SITE_BASE_PATH: /${{ github.event.repository.name }}
        run: |
          node scripts/build.mjs

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
