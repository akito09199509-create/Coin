          base64 -d /tmp/coin-source.tar.br.b64 > /tmp/coin-source.tar.br
          node <<'NODE'
          const fs = require('fs');
          const zlib = require('zlib');
          const compressed = fs.readFileSync('/tmp/coin-source.tar.br');
          fs.writeFileSync('/tmp/coin-source.tar', zlib.brotliDecompressSync(compressed));
NODE

      - name: Replace repository contents
        shell: bash
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xf /tmp/coin-source.tar -C .
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Import blog MVP source' || exit 0
          git push

      - name: Build site for Pages
        shell: bash
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          SITE_BASE_PATH: /${{ github.event.repository.name }}
        run: |
          node scripts/build.mjs

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
